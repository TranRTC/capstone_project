# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - CapstoneIoTDashboard

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/**'
      - '.github/workflows/main_capstoneiotdashboard.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # One publish step: build + publish must be self-contained together.
      # Using `build` then `publish --no-build` reuses a framework-dependent build and omits the runtime (502.5 / "No frameworks were found").
      - name: dotnet publish (self-contained win-x86)
        run: >
          dotnet publish "Backend/IoTMonitoringSystem.API/IoTMonitoringSystem.API.csproj"
          -c Release
          -r win-x86
          --self-contained true
          -p:PublishReadyToRun=false
          -o "${{ env.DOTNET_ROOT }}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.DOTNET_ROOT }}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A7C68F3F699149028F81A53F74761F46 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_29C5938204104ACBB746600EAC393406 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_611443CFEDA04DB981E2E563A85EC04F }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'CapstoneIoTDashboard'
          slot-name: 'Production'
          package: .
